version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/" # Root monorepo
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/shared" # Internal shared toolbox
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/query-builder"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/cli-to-zvo"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/wf-runner"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
