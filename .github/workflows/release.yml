name: Release

on:
  push:
    tags:
      - 'v*'
      - '@ytn/*@*'

permissions:
  contents: write # Obligatoire pour créer la release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true # C'est ici que la magie opère
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
